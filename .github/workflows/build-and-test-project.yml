# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Build and Test PFMG

on:
  push:
    branches: [ "dev", "main" ]
  pull_request:
    branches: [ "dev", "main" ]

permissions:
  contents: read

jobs:
  bump-version-and-lock:
    if: "github.ref == 'refs/heads/dev' && github.event_name == 'push' && !startsWith(github.event.head_commit.message, 'chore: update')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Bump minor version, regenerate lockfile, commit and push
        env:
          UV_SYSTEM_PYTHON: "1"
        run: |
          set -e
          # Only run on merge commits (PR merged into dev)
          PARENTS=$(git rev-list --parents -n 1 HEAD | wc -w)
          [ "$PARENTS" -eq 2 ] || { echo "Not a merge commit, skipping bump"; exit 0; }
          export PATH="$HOME/.local/bin:$PATH"
          OLD=$(grep -E '^version\s*=' pyproject.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          MAJOR=$(echo "$OLD" | cut -d. -f1)
          MINOR=$(echo "$OLD" | cut -d. -f2)
          NEW="${MAJOR}.$((MINOR + 1)).0"
          sed -i "s/^version = .*/version = \"$NEW\"/" pyproject.toml
          rm -f uv.lock
          uv lock
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml uv.lock
          git diff --staged --quiet || git commit -m "chore: update $OLD to $NEW"
          git push

  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Sync dependencies
        env:
          UV_SYSTEM_PYTHON: "1"
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv sync --all-extras --dev
          uv run python -m nltk.downloader wordnet
      - name: Get changed Python files
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff --name-only "${{ github.event.pull_request.base.sha }}" HEAD
          else
            git diff --name-only "${{ github.event.before }}" "${{ github.sha }}"
          fi | grep -E '\.py$' > changed_py.txt || true
          echo "count=$(wc -l < changed_py.txt | tr -d ' ')" >> "$GITHUB_OUTPUT"
      - name: Linter
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          if [ -s changed_py.txt ]; then
            uv run ruff check $(cat changed_py.txt)
            uv run ruff format --check $(cat changed_py.txt)
            uv run pylint $(cat changed_py.txt)
          else
            echo "No Python files changed, skipping linter."
          fi
      - name: Type Checker
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          if [ -s changed_py.txt ]; then
            uv run ty check $(cat changed_py.txt)
          else
            uv run ty check
          fi
      - name: Test with pytest
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv run pytest
