# Run lint, type check and tests on push and pull_request to dev and main.
# See https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: CI

on:
  push:
    branches: ["dev", "main"]
  pull_request:
    branches: ["dev", "main"]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Sync dependencies
        env:
          UV_SYSTEM_PYTHON: "1"
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv sync --all-extras --dev
          uv run python -m nltk.downloader wordnet
      - name: Get changed Python files
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff --name-only "${{ github.event.pull_request.base.sha }}" HEAD
          else
            git diff --name-only "${{ github.event.before }}" "${{ github.sha }}"
          fi | grep -E '\.py$' > changed_py.txt || true
          echo "count=$(wc -l < changed_py.txt | tr -d ' ')" >> "$GITHUB_OUTPUT"
      - name: Linter
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          if [ -s changed_py.txt ]; then
            CHANGED_PY_FILES="$(cat changed_py.txt)"
            NON_TEST_FILES="$(grep -Ev '/test/|/tests/' changed_py.txt || true)"
            uv run ruff check ${CHANGED_PY_FILES}
            if [ -n "${NON_TEST_FILES}" ]; then
              uv run ruff format --check ${NON_TEST_FILES}
            else
              echo "No non-test Python files changed, skipping formatter."
            fi
            uv run pylint ${CHANGED_PY_FILES}
          else
            echo "No Python files changed, skipping linter."
          fi
      - name: Type Checker
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          if [ -s changed_py.txt ]; then
            uv run ty check $(cat changed_py.txt)
          else
            uv run ty check
          fi
      - name: Test with pytest
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv run pytest
