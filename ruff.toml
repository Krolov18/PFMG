cache-dir = "/tmp/ruff_cache"

exclude = [
    ".bzr",
    ".coverage",
    ".direnv",
    ".eggs",
    ".git",
    ".git-rewrite",
    ".hg",
    ".ipynb_checkpoints",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pyenv",
    ".pytest_cache",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    ".vscode",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "site-packages",
    "venv",
    "test",
    "tests",
    "__init__.py",
]

# Same as Black.
line-length = 88
indent-width = 4

# Assume Python 3.14
target-version = "py314"

output-format = "grouped"

[format]
# Like Black, use double quotes for strings.
quote-style = "double"

# Like Black, indent with spaces, rather than tabs.
indent-style = "space"

# Like Black, respect magic trailing commas.
skip-magic-trailing-comma = false

# Like Black, automatically detect the appropriate line ending.
line-ending = "auto"

[lint]
select = [
    "A",
    "ANN001",
    "ASYNC",
    "B",
    "BLE",
    "C901",
    "COM",
    "C4",
    "D",
    "DTZ",
    "E4",
    "E7",
    "E9",
    "EM",
    "EXE",
    "F",
    "FA",
    "FBT",
    "FIX",
    "I",
    "ICN",
    "INP",
    "ISC",
    "N",
    "PIE",
    "PYI",
    "Q",
    "RET",
    "RSE",
    "RUF",
    "S",
    "SLF",
    "ASYNC1",
    "T20",
    "UP",
    "W292",
    "YTT",
]
ignore = [
    "COM812",
    "ISC001",
    "N803",
    "N999",
    "S101",
    "S506",
]
# Re-enable D413 (blank line after last section) despite convention = "google".
extend-select = ["D413"]

# Allow fix for all enabled rules (when `--fix`) is provided.
#fixable = ["ALL"]
unfixable = ["B"]

# Allow unused variables when underscore-prefixed.
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

[lint.pydocstyle]
convention = "google"

[lint.flake8-builtins]
builtins-ignorelist = ["object"]

# Ignore `F401` (import violations) in all `__init__.py` files.
# In test files: ignore D100 (missing docstring in public module),
# D103 (missing docstring in public method), ANN001 (missing type annotation for arg).
[lint.per-file-ignores]
"__init__.py" = ["F401"]
"**/test_*.py" = ["D100", "D103", "ANN001"]
"**/test/**/*.py" = ["D100", "D103", "ANN001"]

