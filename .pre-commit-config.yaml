# Ensure uv is on PATH when hooks run (e.g. from GUI or minimal git env).
# Pre-commit runs with a minimal env; uv is often in ~/.local/bin or ~/.cargo/bin.
repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: bash -c 'export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$PATH" && uv run ruff check'
        language: system
        types: [ python ]
        stages: [ pre-commit ]
      - id: ruff-format
        name: ruff format
        entry: bash -c 'export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$PATH" && uv run ruff format'
        language: system
        types: [ python ]
        stages: [ pre-commit ]
  - repo: local
    hooks:
      - id: ty
        name: ty
        entry: bash -c 'export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$PATH" && uv run ty check'
        language: system
        pass_filenames: false
        files: \.py$
        stages: [ pre-commit ]
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: bash -c 'export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$PATH" && uv run pytest -vv --showlocals'
        language: system
        pass_filenames: false
        files: \.py$
        stages: [ pre-commit ]
  - repo: local
    hooks:
      - id: pylint
        name: pylint
        entry: bash -c 'export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$PATH" && uv run pylint "$@"' bash
        language: system
        types: [ python ]
        stages: [ pre-commit ]
  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.24.0
    hooks:
      - id: commitlint
        stages: [ commit-msg ]
        additional_dependencies: ["@commitlint/config-conventional"]
