repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: "v0.15.5"
    hooks:
      # Run the linter.
      - id: ruff
        always_run: true
        stages: [ pre-commit ]
      # Run the formatter.
      - id: ruff-format
        always_run: true
        stages: [ pre-commit ]
  - repo: local
    hooks:
      - id: ty
        name: ty
        entry: ty check
        language: python
        additional_dependencies: [ty]
        pass_filenames: false
        always_run: true
        stages: [ pre-commit ]
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: ~/.pyenv/versions/3.12.0/envs/PFMG/bin/pytest
        args:
          - -vv
          - --showlocals
        language: python
        pass_filenames: false
        always_run: true
        stages: [ pre-commit ]
  - repo: local
    hooks:
      - id: copyright
        name: copyright
        language: script
        always_run: true
        entry: ./bin/apply_licence.sh
        stages:
          - pre-commit
  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.24.0
    hooks:
      - id: commitlint
        stages: [ commit-msg ]
